services:
  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  web:
    build:
      target: base
    command: ["pnpm", "dev"]
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/public:/app/public
    environment:
      NODE_ENV: development

  parser:
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./apps/parser/app:/app/app
    environment:
      PARSER_DEBUG: "true"
