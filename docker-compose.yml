services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      PARSER_URL: ${PARSER_URL}
      UPLOAD_DIR: /app/storage/uploads
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-20}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Admin}
      POSTGRES_USER: ${POSTGRES_USER}
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    volumes:
      - uploads:/app/storage/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - internal

  worker:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    entrypoint: []
    command: ["node", "--import", "tsx", "src/worker/index.ts"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      PARSER_URL: ${PARSER_URL}
      UPLOAD_DIR: /app/storage/uploads
    volumes:
      - uploads:/app/storage/uploads
    depends_on:
      web:
        condition: service_healthy
    networks:
      - internal

  parser:
    build:
      context: ./apps/parser
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PARSER_UPLOAD_DIR: /app/storage/uploads
      PARSER_MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-20}
    volumes:
      - uploads:/app/storage/uploads
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - internal

volumes:
  postgres_data:
  uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./storage/uploads

networks:
  internal:
    driver: bridge
